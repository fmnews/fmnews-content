name: Sync cricket scores

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cricket-sync
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}
        run: python scripts/cricket-fetch.py
      - run: |
          git config user.name "fmnews-bot"
          git config user.email "fmnews-bot@users.noreply.github.com"
          if git diff --quiet -- cricket.json; then exit 0; fi
          git add cricket.json
          git commit -m "Auto: sync cricket scores"
          git push
